<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Near-black surface with a hairline amber edge, matching --c-bg / --c-amber -->
  <rect width="32" height="32" rx="6" fill="#08090C"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5" fill="none"
        stroke="#F0A429" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Geometric H, echoing the Syne monogram in the header -->
  <g fill="#F0A429">
    <rect x="8"  y="7"    width="5"  height="18"/>
    <rect x="19" y="7"    width="5"  height="18"/>
    <rect x="8"  y="13.5" width="16" height="5"/>
  </g>
</svg>
